name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: Build binaries
        working-directory: cli
        run: |
          VERSION=${GITHUB_REF_NAME}
          GOOS=darwin  GOARCH=arm64 go build -ldflags "-X main.Version=$VERSION" -o blueprint-darwin-arm64  .
          GOOS=darwin  GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o blueprint-darwin-amd64  .
          GOOS=linux   GOARCH=amd64 go build -ldflags "-X main.Version=$VERSION" -o blueprint-linux-amd64   .
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            cli/blueprint-darwin-arm64
            cli/blueprint-darwin-amd64
            cli/blueprint-linux-amd64
          generate_release_notes: true
