name: Sync Plugin Repo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo
        uses: actions/checkout@v4
        with:
          path: main

      - name: Checkout plugin repo
        uses: actions/checkout@v4
        with:
          repository: skaisser/blueprint-plugin
          token: ${{ secrets.PLUGIN_REPO_TOKEN }}
          path: plugin

      - name: Sync files
        run: |
          # Sync skills (full replace)
          rm -rf plugin/skills
          cp -r main/skills plugin/skills

          # Sync config
          mkdir -p plugin/config
          cp main/config/statusline.sh plugin/config/statusline.sh
          chmod +x plugin/config/statusline.sh

          # Sync templates
          rm -rf plugin/templates
          cp -r main/templates plugin/templates
          chmod +x plugin/templates/.githooks/commit-msg 2>/dev/null || true
          chmod +x plugin/templates/.githooks/pre-push 2>/dev/null || true

      - name: Update plugin version
        run: |
          TAG="${GITHUB_REF_NAME:-manual}"
          VERSION="${TAG#v}"
          cd plugin
          if command -v jq >/dev/null 2>&1; then
            jq --arg v "$VERSION" '. + {version: $v}' .claude-plugin/plugin.json > tmp.json && mv tmp.json .claude-plugin/plugin.json
          fi

      - name: Commit and push
        run: |
          cd plugin
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync"
          else
            TAG="${GITHUB_REF_NAME:-manual}"
            git commit -m "🔄 ci: sync from blueprint ${TAG}"
            git push
          fi
